---
name: Staging
on:
  workflow_dispatch:
    inputs:
      baseSha:
        description: "Use base SHA commit to deploy from (empty string defaults to last commit before HEAD)"
        type: string
        required: false
        default: ""
      deployAll:
        description: "Force deploy all files"
        type: boolean
        default: false
jobs:
  deployment:
    name: Deployment
    uses: AdobeDocs/adp-devsite-workflow/.github/workflows/deploy-v2.yml@main
    secrets: inherit
    with:
      env: stage
      baseSha: ${{ inputs.baseSha }}
      deployAll: ${{ inputs.deployAll }}

  upload_playground:
    name: Upload playground samples (stage)
    needs: deployment
    uses: ./.github/workflows/upload-playground.yml
    with:
      deploy_env: stage
      target_branch: ${{ github.ref_name }}
      folder_path: src/pages
    secrets: inherit
